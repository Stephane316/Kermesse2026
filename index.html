<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — La Kermesse 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow:#FFD93D; --yellow-light:#FFF6C2;
  --pink:#FF6B9D; --pink-light:#FFE0EE;
  --coral:#FF8B60; --coral-light:#FFE8DC;
  --teal:#4ECDC4;
  --purple:#A855F7; --purple-light:#F3E8FF;
  --green:#6BCB77;
  --bg:#FFF9EE; --white:#FFFFFF;
  --ink:#2D2A1E; --ink-mid:#5A5240; --ink-light:#9C917E;
  --border:#F0E6D0;
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--ink);min-height:100vh;padding:0 0 4rem;}

/* LANG */
.lang-bar{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--ink);}
.lang-btn{font-family:'Baloo 2',cursive;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;border:2px solid transparent;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);background:transparent;}
.lang-btn.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow);}
.lang-btn:hover:not(.active){color:#fff;border-color:rgba(255,255,255,.3);}

/* HERO */
.hero{background:var(--yellow);padding:2rem 2rem 1.5rem;text-align:center;position:relative;overflow:hidden;border-bottom:4px solid var(--ink);}
.blob{position:absolute;border-radius:50%;opacity:.35;}
.b1{width:180px;height:180px;background:var(--pink);top:-60px;left:-40px;}
.b2{width:140px;height:140px;background:var(--coral);bottom:-50px;right:-30px;}
.b3{width:100px;height:100px;background:var(--teal);top:10px;right:60px;}
.hero-tag{display:inline-block;font-family:'Baloo 2',cursive;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--pink);border-radius:20px;padding:4px 14px;margin-bottom:.75rem;position:relative;}
.hero-time{display:inline-flex;align-items:center;gap:8px;background:#fff;border:2px solid var(--ink);border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700;color:var(--ink);position:relative;margin-top:.75rem;}
.hero-desc{font-size:13px;color:var(--ink-mid);max-width:580px;margin:1rem auto 0;font-weight:500;position:relative;text-align:left;background:rgba(255,255,255,0.75);border-radius:12px;padding:1rem 1.25rem;border:1px solid rgba(0,0,0,0.08);line-height:1.7;}

/* CONTAINER */
.container{max-width:640px;margin:0 auto;padding:0 1.25rem;}
.form-body{margin-top:2rem;display:flex;flex-direction:column;gap:1.5rem;}

/* CARDS */
.card{background:var(--white);border:2px solid var(--ink);border-radius:var(--radius);padding:1.5rem;box-shadow:4px 4px 0 var(--ink);}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px dashed var(--border);}
.card-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;flex-shrink:0;border:2px solid var(--ink);}
.cn1{background:var(--yellow);color:var(--ink)}.cn2{background:var(--pink);color:#fff}.cn3{background:var(--teal);color:#fff}.cn4{background:var(--coral);color:#fff}
.card-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;}

/* FIELDS */
.field{margin-bottom:1rem;}.field:last-child{margin-bottom:0;}
label{display:block;font-size:13px;font-weight:700;color:var(--ink-mid);margin-bottom:6px;}
.req{color:var(--pink);margin-left:3px;}
input[type=text],input[type=email],input[type=tel],textarea,select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--ink);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--pink);background:#fff;}
textarea{resize:vertical;min-height:80px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.row{grid-template-columns:1fr}}

/* CHECK / RADIO */
.cbg,.rbg{display:flex;flex-direction:column;gap:8px;}
.ci,.ri{display:flex;align-items:center;gap:10px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:border-color .15s,background .15s;font-size:14px;font-weight:600;background:var(--bg);}
.ci:hover,.ri:hover{border-color:var(--pink);background:var(--pink-light);}
.ci input,.ri input{width:16px;height:16px;margin:0;accent-color:var(--pink);flex-shrink:0;}
.ci.on{border-color:var(--pink);background:var(--pink-light);}

/* ALERT */
.alert{font-size:13px;font-weight:700;background:var(--yellow-light);border:2px solid var(--yellow);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:1.25rem;line-height:1.5;}

/* GUIGNOL */
.gi{background:var(--purple-light)!important;border-color:var(--purple)!important;flex-direction:column!important;align-items:flex-start!important;gap:6px!important;}
.gw{font-size:12px;color:var(--purple);padding-left:26px;line-height:1.5;font-weight:700;}

/* ENFANT */
.enfant-block+.enfant-block{margin-top:1rem;padding-top:1rem;border-top:2px dashed var(--border);}
.elabel{font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;color:var(--coral);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.btn-rm{font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--ink-light);background:none;border:none;cursor:pointer;}
.btn-add{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--coral);background:var(--coral-light);border:2px dashed var(--coral);border-radius:var(--radius-sm);padding:9px 14px;cursor:pointer;width:100%;margin-top:.75rem;transition:background .15s;}
.btn-add:hover{background:#ffd5c0;}

/* TARIF */
.tarif-card{background:var(--teal);border:2px solid var(--ink);border-radius:var(--radius);padding:1.5rem;box-shadow:4px 4px 0 var(--ink);}
.th{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px dashed rgba(0,0,0,.15);}
.tn{width:32px;height:32px;background:var(--yellow);color:var(--ink);border-radius:50%;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;flex-shrink:0;}
.tt{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--ink);}
.trule{font-size:13px;font-weight:600;background:rgba(255,255,255,.4);border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.1);padding:10px 14px;margin-bottom:1.25rem;line-height:1.7;}
.crow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.1);}
.crow:last-of-type{border-bottom:none;}
.clabel{font-size:15px;font-weight:700;color:var(--ink);}
.csub{font-size:12px;color:rgba(0,0,0,.5);font-weight:600;margin-top:2px;}
.cctl{display:flex;align-items:center;gap:12px;}
.bcnt{width:34px;height:34px;border-radius:var(--radius-sm);border:2px solid var(--ink);background:#fff;color:var(--ink);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:'Nunito',sans-serif;}
.bcnt:hover{background:var(--yellow-light);}
.cval{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;min-width:24px;text-align:center;color:var(--ink);}
.tres{margin-top:1.25rem;padding-top:1.25rem;border-top:2px dashed rgba(0,0,0,.15);}
.dline{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:rgba(0,0,0,.55);padding:3px 0;}
.tline{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:2px solid rgba(0,0,0,.15);}
.tlabel{font-size:14px;font-weight:700;color:var(--ink);}
.tamount{font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;background:var(--yellow);border:2px solid var(--ink);border-radius:var(--radius-sm);padding:2px 14px;}
.virement{background:var(--pink-light);border:2px solid var(--pink);border-radius:var(--radius-sm);padding:10px 14px;margin-top:1rem;font-size:13px;font-weight:700;color:var(--ink-mid);line-height:1.5;}

/* SUBMIT */
.sub-btn{width:100%;padding:16px;background:var(--pink);color:#fff;border:2px solid var(--ink);border-radius:var(--radius);font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;cursor:pointer;box-shadow:4px 4px 0 var(--ink);transition:background .15s;}
.sub-btn:hover{background:#e8557f;}
.sub-btn:disabled{opacity:.6;cursor:not-allowed;}
.footer-note{text-align:center;font-size:12px;font-weight:600;color:var(--ink-light);margin-top:1rem;}

@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card,.tarif-card{animation:fu .4s ease both;}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}.tarif-card{animation-delay:.2s;}
</style>
</head>

// ── State ──────────────────────────────────────────────────────────
var lang = 'fr';
var s = {a:1, c:1, b:0};
var ec = 1;
var CL = ['TPS-PS','PS-MS','MS-GS','GSB','CP','CE1','CE2','CM1','CM2'];

// ── Lang ───────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  var t = T[l];
  document.querySelectorAll('.lang-btn').forEach(function(b,i){
    b.classList.toggle('active', ['fr','en','id'][i]===l);
  });
  document.getElementById('hero-tag').textContent = t.tag;
  document.getElementById('hero-date').textContent = t.date;
  document.getElementById('hero-desc').innerHTML = t.desc;
  document.getElementById('s1-title').textContent = t.s1;
  document.getElementById('l-prenom').textContent = t.prenom;
  document.getElementById('l-nom').textContent = t.nom;
  document.getElementById('l-email').textContent = t.email;
  document.getElementById('l-tel').textContent = t.tel;
  document.getElementById('s2-title').textContent = t.s2;
  document.getElementById('child-alert').textContent = t.alert;
  document.getElementById('l-cfname').textContent = t.cfname;
  document.getElementById('l-cclass').textContent = t.cclass;
  document.getElementById('sel-ph').textContent = t.selph;
  document.getElementById('opt-other').textContent = t.other;
  document.getElementById('btn-add').textContent = t.add;
  document.getElementById('l-contraintes').textContent = t.contraintes;
  document.getElementById('ta-contraintes').placeholder = t.contraintes_ph;
  document.getElementById('s3-title').textContent = t.s3;
  document.getElementById('l-puppet-q').textContent = t.puppet_q;
  document.getElementById('puppet-yes').textContent = t.puppet_yes;
  document.getElementById('puppet-warn').textContent = t.puppet_warn;
  document.getElementById('s4-title').textContent = t.s4;
  document.getElementById('tarif-rule').innerHTML = t.rule;
  document.getElementById('l-adults').textContent = t.adults;
  document.getElementById('l-children').textContent = t.children;
  document.getElementById('l-babies').textContent = t.babies;
  document.getElementById('l-free').textContent = t.free;
  document.getElementById('l-total').textContent = t.total;
  document.getElementById('l-virement').innerHTML = t.virement;
  document.getElementById('submit-btn').textContent = t.submit;
  document.getElementById('l-footer').textContent = t.footer;
  document.getElementById('elabel-1').textContent = t.child(1);
  document.getElementById('f-langue').value = l;

  // Update dynamic child labels
  document.querySelectorAll('.enfant-block').forEach(function(b,i){
    var lbl = b.querySelector('.elabel');
    if(lbl){
      var rm = lbl.querySelector('.btn-rm');
      lbl.textContent = t.child(i+1);
      if(rm) lbl.appendChild(rm);
    }
  });
  rt();
}

// ── Tarif ──────────────────────────────────────────────────────────
function fmt(n){ return n.toLocaleString('fr-FR') + ' Rp'; }

function ch(k, d) {
  s[k] = Math.max(0, s[k]+d);
  rt();
}

function rt() {
  var t = T[lang];
  document.getElementById('va').textContent = s.a;
  document.getElementById('vc').textContent = s.c;
  document.getElementById('vb').textContent = s.b;
  document.getElementById('f-adultes').value = s.a;
  document.getElementById('f-enfants').value = s.c;
  document.getElementById('f-bebes').value = s.b;
  var total = s.a + s.c;
  var price = 0;
  var lines = [];
  if(total > 0){
    price = 150000;
    lines.push({l: t.base_lbl, v: 150000});
    var extra = Math.max(0, total-2);
    if(extra > 0){
      var xc = extra*50000;
      price += xc;
      lines.push({l: t.extra_lbl(extra), v: xc});
    }
  }
  if(s.b > 0) lines.push({l: t.baby_lbl(s.b), v: 0});
  document.getElementById('dc').innerHTML = lines.map(function(l){
    return '<div class="dline"><span>'+l.l+'</span><span>'+(l.v===0?'—':fmt(l.v))+'</span></div>';
  }).join('');
  var totalStr = total===0 ? fmt(0) : fmt(price);
  document.getElementById('td').textContent = totalStr;
  document.getElementById('f-total').value = totalStr;
}

// ── Checkbox ───────────────────────────────────────────────────────
function toggleCheck(input) {
  input.closest('.ci').classList.toggle('on', input.checked);
}

function updateGuignols() {
  var cb = document.getElementById('puppet-cb');
  document.getElementById('f-guignols').value = cb.checked ? 'Oui' : 'Non';
}

// ── Children ───────────────────────────────────────────────────────
function addEnfant() {
  if(ec >= 4) return;
  ec++;
  var t = T[lang];
  var opts = CL.map(function(c){ return '<option>'+c+'</option>'; }).join('') + '<option>'+t.other+'</option>';
  var b = document.createElement('div');
  b.className = 'enfant-block';
  b.innerHTML = '<div class="elabel">'+t.child(ec)+'<button type="button" class="btn-rm" onclick="rmEnfant(this)">'+t.remove+'</button></div>'
    +'<div class="row">'
    +'<div class="field"><label>'+t.cfname+'</label><input type="text" name="enfant_'+ec+'_prenom" placeholder="Lucas"></div>'
    +'<div class="field"><label>'+t.cclass+'</label><select name="enfant_'+ec+'_classe"><option value="" disabled selected>'+t.selph+'</option>'+opts+'</select></div>'
    +'</div>';
  document.getElementById('ec').appendChild(b);
  if(ec >= 4) document.getElementById('btn-add').style.display = 'none';
}

function rmEnfant(btn) {
  btn.closest('.enfant-block').remove();
  ec--;
  document.getElementById('btn-add').style.display = 'flex';
  var t = T[lang];
  document.querySelectorAll('.enfant-block').forEach(function(b, i){
    var lbl = b.querySelector('.elabel');
    if(lbl){
      var rm = lbl.querySelector('.btn-rm');
      lbl.textContent = t.child(i+1);
      if(rm) lbl.appendChild(rm);
    }
  });
}

// ── Submit ─────────────────────────────────────────────────────────
function doSubmit() {
  var btn = document.getElementById('submit-btn');
  if(btn.disabled) return;

  // Disable button
  btn.disabled = true;
  btn.textContent = lang==='fr' ? '⏳ Envoi en cours…' : lang==='en' ? '⏳ Sending…' : '⏳ Mengirim…';

  // Submit the form natively
  document.getElementById('mainForm').submit();
}

// ── Init ───────────────────────────────────────────────────────────
setLang('fr');
</script>
