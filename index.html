<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — La Kermesse</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow:#FFD93D;--yellow-light:#FFF6C2;
    --pink:#FF6B9D;--pink-light:#FFE0EE;
    --coral:#FF8B60;--coral-light:#FFE8DC;
    --teal:#4ECDC4;--teal-light:#D8F6F4;
    --purple:#A855F7;--purple-light:#F3E8FF;
    --green:#6BCB77;
    --bg:#FFF9EE;--white:#FFFFFF;
    --ink:#2D2A1E;--ink-mid:#5A5240;--ink-light:#9C917E;
    --border:#F0E6D0;
    --radius:16px;--radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--ink);min-height:100vh;padding:0 0 4rem;}

  /* LANG SWITCHER */
  .lang-bar{display:flex;justify-content:center;gap:8px;padding:12px 16px;background:var(--ink);}
  .lang-btn{font-family:'Baloo 2',cursive;font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;border:2px solid transparent;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);background:transparent;}
  .lang-btn.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow);}
  .lang-btn:hover:not(.active){color:var(--white);border-color:rgba(255,255,255,.3);}

  /* HERO */
  .hero{background:var(--yellow);padding:2.5rem 2rem 2rem;text-align:center;position:relative;overflow:hidden;border-bottom:4px solid var(--ink);}
  .blob{position:absolute;border-radius:50%;opacity:.35;}
  .b1{width:180px;height:180px;background:var(--pink);top:-60px;left:-40px;}
  .b2{width:140px;height:140px;background:var(--coral);bottom:-50px;right:-30px;}
  .b3{width:100px;height:100px;background:var(--teal);top:10px;right:60px;}
  .hero-tag{display:inline-block;font-family:'Baloo 2',cursive;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--white);background:var(--pink);border-radius:20px;padding:4px 14px;margin-bottom:.75rem;position:relative;}
  .hero h1{font-family:'Baloo 2',cursive;font-size:clamp(2.2rem,6vw,3.2rem);font-weight:800;line-height:1.05;color:var(--ink);margin-bottom:.6rem;position:relative;}
  .wla{color:var(--pink)}.wker{color:var(--coral)}.wmes{color:var(--teal)}
  .hero-sub{font-size:13px;color:var(--ink-mid);max-width:580px;margin:0 auto 1.25rem;font-weight:500;position:relative;text-align:left;background:rgba(255,255,255,0.7);border-radius:12px;padding:1rem 1.25rem;border:1px solid rgba(0,0,0,0.08);line-height:1.7;}
  .hero-time{display:inline-flex;align-items:center;gap:8px;background:var(--white);border:2px solid var(--ink);border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700;color:var(--ink);position:relative;}

  .container{max-width:640px;margin:0 auto;padding:0 1.25rem;}
  .form-body{margin-top:2rem;display:flex;flex-direction:column;gap:1.5rem;}

  .card{background:var(--white);border:2px solid var(--ink);border-radius:var(--radius);padding:1.5rem;box-shadow:4px 4px 0 var(--ink);}
  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px dashed var(--border);}
  .card-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;flex-shrink:0;border:2px solid var(--ink);}
  .cn1{background:var(--yellow);color:var(--ink)}.cn2{background:var(--pink);color:var(--white)}.cn3{background:var(--teal);color:var(--white)}.cn4{background:var(--coral);color:var(--white)}
  .card-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--ink);}

  .field{margin-bottom:1rem;}.field:last-child{margin-bottom:0;}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-mid);margin-bottom:6px;}
  label .req{color:var(--pink);margin-left:3px;}
  input[type=text],input[type=email],input[type=tel],textarea,select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--ink);outline:none;transition:border-color .15s;appearance:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--pink);background:var(--white);}
  textarea{resize:vertical;min-height:80px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:480px){.row{grid-template-columns:1fr}}

  .cbg,.rbg{display:flex;flex-direction:column;gap:8px;}
  .ci,.ri{display:flex;align-items:center;gap:10px;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:border-color .15s,background .15s;font-size:14px;font-weight:600;color:var(--ink);background:var(--bg);}
  .ci:hover,.ri:hover{border-color:var(--pink);background:var(--pink-light);}
  .ci input,.ri input{width:16px;height:16px;margin:0;accent-color:var(--pink);flex-shrink:0;}
  .ci.on,.ri.on{border-color:var(--pink);background:var(--pink-light);}

  .alert{font-size:13px;font-weight:700;background:var(--yellow-light);border:2px solid var(--yellow);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:1.25rem;color:var(--ink-mid);line-height:1.5;}
  .gi{background:var(--purple-light)!important;border-color:var(--purple)!important;flex-direction:column!important;align-items:flex-start!important;gap:6px!important;}
  .gw{font-size:12px;color:var(--purple);padding-left:26px;line-height:1.5;font-weight:700;}

  .enfant-block+.enfant-block{margin-top:1rem;padding-top:1rem;border-top:2px dashed var(--border);}
  .elabel{font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;color:var(--coral);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .btn-rm{font-size:12px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--ink-light);background:none;border:none;cursor:pointer;}
  .btn-add{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--coral);background:var(--coral-light);border:2px dashed var(--coral);border-radius:var(--radius-sm);padding:9px 14px;cursor:pointer;width:100%;margin-top:.75rem;transition:background .15s;}
  .btn-add:hover{background:#ffd5c0}

  .tarif-card{background:var(--teal);border:2px solid var(--ink);border-radius:var(--radius);padding:1.5rem;box-shadow:4px 4px 0 var(--ink);}
  .th{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px dashed rgba(0,0,0,.15);}
  .tn{width:32px;height:32px;background:var(--yellow);color:var(--ink);border-radius:50%;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;flex-shrink:0;}
  .tt{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--ink);}
  .trule{font-size:13px;font-weight:600;color:var(--ink);background:rgba(255,255,255,.4);border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.1);padding:10px 14px;margin-bottom:1.25rem;line-height:1.7;}
  .crow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.1);}
  .crow:last-of-type{border-bottom:none}
  .clabel{font-size:15px;font-weight:700;color:var(--ink)}.csub{font-size:12px;color:rgba(0,0,0,.5);font-weight:600;margin-top:2px}
  .cctl{display:flex;align-items:center;gap:12px}
  .bcnt{width:34px;height:34px;border-radius:var(--radius-sm);border:2px solid var(--ink);background:var(--white);color:var(--ink);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;line-height:1;font-family:'Nunito',sans-serif;}
  .bcnt:hover{background:var(--yellow-light)}.bcnt:active{transform:scale(.93)}
  .cval{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;min-width:24px;text-align:center;color:var(--ink);}
  .tres{margin-top:1.25rem;padding-top:1.25rem;border-top:2px dashed rgba(0,0,0,.15);}
  .dline{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:rgba(0,0,0,.55);padding:3px 0;}
  .tline{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:2px solid rgba(0,0,0,.15);}
  .tlabel{font-size:14px;font-weight:700;color:var(--ink)}
  .tamount{font-family:'Baloo 2',cursive;font-size:30px;font-weight:800;color:var(--ink);background:var(--yellow);border:2px solid var(--ink);border-radius:var(--radius-sm);padding:2px 14px;}
  .virement{background:var(--pink-light);border:2px solid var(--pink);border-radius:var(--radius-sm);padding:10px 14px;margin-top:1rem;font-size:13px;font-weight:700;color:var(--ink-mid);line-height:1.5;}

  .sub-btn{width:100%;padding:16px;background:var(--pink);color:var(--white);border:2px solid var(--ink);border-radius:var(--radius);font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;box-shadow:4px 4px 0 var(--ink);}
  .sub-btn:hover{background:#e8557f}.sub-btn:active{transform:scale(.98);box-shadow:2px 2px 0 var(--ink)}
  .footer{text-align:center;font-size:12px;font-weight:600;color:var(--ink-light);margin-top:1rem;}

  .success{display:none;background:var(--white);border:2px solid var(--ink);border-radius:var(--radius);padding:2.5rem 1.5rem;text-align:center;margin-top:2rem;box-shadow:4px 4px 0 var(--ink);}
  .sicon{width:60px;height:60px;background:var(--green);border:2px solid var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;box-shadow:3px 3px 0 var(--ink);}
  .stitle{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;margin-bottom:.5rem;color:var(--green);}
  .ssub{font-size:14px;font-weight:600;color:var(--ink-mid);}

  @keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .card,.tarif-card{animation:fu .4s ease both}
  .card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}.tarif-card{animation-delay:.25s}
</style>
</head>

let lang = 'fr';

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['fr','en','id'][i]===l);
  });
  const t = T[l];
  document.querySelectorAll('[data-i]').forEach(el => {
    const key = el.getAttribute('data-i');
    if(t[key] !== undefined && typeof t[key] === 'string') el.innerHTML = t[key];
  });
  document.querySelectorAll('[data-i-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i-placeholder');
    if(t[key]) el.placeholder = t[key];
  });
  // Update child labels
  document.querySelectorAll('.enfant-block').forEach((b,i) => {
    const lbl = b.querySelector('.elabel');
    if(lbl) {
      const rmBtn = lbl.querySelector('.btn-rm');
      lbl.innerHTML = t.child_label(i+1);
      if(rmBtn){ const nb=document.createElement('button');nb.type='button';nb.className='btn-rm';nb.textContent=t.remove;nb.onclick=function(){rmEnfant(this);};lbl.appendChild(nb); }
    }
  });
  // Re-render tarif with new labels
  rt();
  refreshGaugeLang();
}

// TARIF
const s={a:1,c:1,b:0};
function ch(k,d){s[k]=Math.max(0,s[k]+d);rt();}
function fmt(n){return 'Rp '+n.toLocaleString('fr-FR');}
function rt(){
  document.getElementById('va').textContent=s.a;
  document.getElementById('vc').textContent=s.c;
  document.getElementById('vb').textContent=s.b;
  const t=s.a+s.c,tl=T[lang];let p=0,ls=[];
  if(t>0){
    p=150000;ls.push({l:tl.base_label,v:150000});
    const x=Math.max(0,t-2);
    if(x>0){const xc=x*50000;p+=xc;ls.push({l:tl.extra_label(x),v:xc});}
  }
  if(s.b>0)ls.push({l:tl.baby_label(s.b),v:0});
  document.getElementById('dc').innerHTML=ls.map(l=>`<div class="dline"><span>${l.l}</span><span>${l.v===0?'—':fmt(l.v)}</span></div>`).join('');
  document.getElementById('td').textContent=t===0?fmt(0):fmt(p);
}

function toggleCheck(i){i.closest('.ci').classList.toggle('on',i.checked);}
function toggleRadio(i){document.querySelectorAll('.ri').forEach(r=>r.classList.remove('on'));i.closest('.ri').classList.add('on');}

function handleSubmit(e){
  e.preventDefault();
  const form = document.getElementById('mainForm');

  // Prevent double submission
  const btn = form.querySelector('.sub-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.style.cursor = 'not-allowed';
  btn.textContent = '⏳ Envoi en cours…';

  // Build payload
  const payload = new URLSearchParams();
  payload.append('form-name', 'kermesse');
  payload.append('langue', lang);
  payload.append('nb_adultes', s.a);
  payload.append('nb_enfants', s.c);
  payload.append('nb_bebes', s.b);
  payload.append('total_rp', document.getElementById('td').textContent);
  payload.append('spectacle_guignols', (form.querySelector('.gi input[type=checkbox]')||{}).checked ? 'Oui' : 'Non');
  payload.append('benevolat', (form.querySelector('input[name=benv]:checked')||{}).value || 'Non renseigné');

  // Named text inputs
  const textInputs = form.querySelectorAll('input[type=text]:not([style*=display])');
  payload.append('prenom', textInputs[0] ? textInputs[0].value : '');
  payload.append('nom',    textInputs[1] ? textInputs[1].value : '');
  payload.append('email',  (form.querySelector('input[type=email]')||{}).value || '');
  payload.append('telephone', (form.querySelector('input[type=tel]')||{}).value || '');
  payload.append('contraintes', (form.querySelector('textarea')||{}).value || '');

  // Children
  form.querySelectorAll('.enfant-block').forEach((b, i) => {
    const n = i+1;
    payload.append('enfant_'+n+'_prenom', (b.querySelector('input[type=text]')||{}).value || '');
    payload.append('enfant_'+n+'_classe', (b.querySelector('select')||{}).value || '');
  });

  fetch('/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: payload.toString()
  })
  .then(() => {
    // Increment counter with number of children
    fetch('/.netlify/functions/counter', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ add: s.c })
    }).then(r => r.json()).then(data => updateGaugeUI(data.count)).catch(()=>{});
    showSuccess();
  })
  .catch(() => showSuccess());
}

function showSuccess(){
  document.getElementById('mainForm').style.display='none';
  const ok = document.getElementById('ok');
  ok.style.display = 'block';
  ok.scrollIntoView({ behavior: 'smooth' });
}

let ec=1;
const CL=['TPS-PS','PS-MS','MS-GS','GSB','CP','CE1','CE2','CM1','CM2'];
function addEnfant(){
  if(ec>=4)return;ec++;
  const t=T[lang];
  const opts=CL.map(c=>`<option>${c}</option>`).join('')+`<option>${t.other}</option>`;
  const b=document.createElement('div');b.className='enfant-block';b.dataset.index=ec;
  b.innerHTML=`<div class="elabel">${t.child_label(ec)}<button type="button" class="btn-rm" onclick="rmEnfant(this)">${t.remove}</button></div><div class="row"><div class="field"><label>${t.child_fname}</label><input type="text" name="e${ec}p" placeholder="Lucas"></div><div class="field"><label>${t.child_class}</label><select name="e${ec}c"><option value="" disabled selected>${t.select_ph}</option>${opts}</select></div></div>`;
  document.getElementById('ec').appendChild(b);
  if(ec>=4)document.getElementById('btn-add').style.display='none';
}
function rmEnfant(btn){
  btn.closest('.enfant-block').remove();ec--;
  document.getElementById('btn-add').style.display='flex';
  const t=T[lang];
  document.querySelectorAll('.enfant-block').forEach((b,i)=>{
    const l=b.querySelector('.elabel');
    if(l){const rm=l.querySelector('.btn-rm');l.textContent=t.child_label(i+1);if(rm)l.appendChild(rm);}
  });
}

// Init
setLang('fr');

// ── Gauge ────────────────────────────────────────
const GAUGE_MAX = 250;

async function loadGauge() {
  try {
    const res = await fetch('/.netlify/functions/counter');
    const data = await res.json();
    updateGaugeUI(data.count);
  } catch(e) {
    // silently fail — hide gauge if function unavailable
    const gc = document.getElementById('gauge-card');
    if (gc) gc.style.display = 'none';
  }
}

function updateGaugeUI(count) {
  const t = T[lang];
  const remaining = Math.max(0, GAUGE_MAX - count);
  const pct = Math.min(100, (count / GAUGE_MAX) * 100);

  const bar = document.getElementById('gauge-bar');
  const countEl = document.getElementById('gauge-count');
  const msgEl = document.getElementById('gauge-msg');

  if (!bar) return;

  bar.style.width = pct + '%';

  // Color based on fill level
  if (pct >= 100) {
    bar.style.background = '#ef4444';
  } else if (pct >= 80) {
    bar.style.background = '#f97316';
  } else if (pct >= 60) {
    bar.style.background = '#FFD93D';
  } else {
    bar.style.background = '#6BCB77';
  }

  countEl.textContent = remaining + ' / ' + GAUGE_MAX;

  if (pct >= 100) {
    msgEl.textContent = t.gauge_full;
    msgEl.style.color = '#ef4444';
  } else if (pct >= 80) {
    msgEl.textContent = t.gauge_hurry;
    msgEl.style.color = '#f97316';
  } else {
    msgEl.textContent = t.gauge_remaining(remaining);
    msgEl.style.color = 'var(--ink-light)';
  }

  // Update gauge title
  document.querySelectorAll('[data-i="gauge_title"]').forEach(el => {
    el.textContent = t.gauge_title;
  });
}

// Reload gauge when lang changes
const _origSetLang = setLang;
// Refresh gauge labels on lang switch
function refreshGaugeLang() {
  const bar = document.getElementById('gauge-bar');
  if (!bar) return;
  const pct = parseFloat(bar.style.width) || 0;
  const count = Math.round((pct / 100) * GAUGE_MAX);
  updateGaugeUI(count);
}

loadGauge();
</script>
